name: On-Demand Fuzz

on:
  workflow_dispatch:
    inputs:
      generator:
        description: "Generator to use"
        type: choice
        options:
          - all
          - chimera
          - vloghammer
        default: all
      count:
        description: "Number of designs"
        type: number
        default: 50
      seed:
        description: "Random seed (Chimera only)"
        type: string
        default: ""
      cycles:
        description: "Simulation cycles per design"
        type: number
        default: 100
      file_issues:
        description: "Auto-file GitHub issues for findings"
        type: boolean
        default: false

jobs:
  fuzz:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/seiraiyu/ryusim-fuzz:latest
    timeout-minutes: 60
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build generators
        run: |
          bash scripts/setup_chimera.sh
          bash scripts/setup_vloghammer.sh

      - name: Run fuzzing
        run: |
          GEN_ARG=""
          if [ "${{ inputs.generator }}" = "all" ]; then
            GEN_ARG="--all"
          else
            GEN_ARG="--generator ${{ inputs.generator }}"
          fi
          SEED_ARG=""
          if [ -n "${{ inputs.seed }}" ]; then
            SEED_ARG="--seed ${{ inputs.seed }}"
          fi
          ISSUE_ARG=""
          if [ "${{ inputs.file_issues }}" = "true" ]; then
            ISSUE_ARG="--file-issues"
          fi
          python3 -u run_fuzz.py \
            $GEN_ARG \
            --count ${{ inputs.count }} \
            --cycles ${{ inputs.cycles }} \
            $SEED_ARG \
            $ISSUE_ARG \
            --verbose \
            --output results/fuzz-ondemand.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ondemand-fuzz-results
          path: |
            results/
            findings/
          retention-days: 30
