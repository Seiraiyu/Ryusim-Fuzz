name: Weekly Deep Fuzz

on:
  schedule:
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      count:
        description: "Number of designs per generator"
        type: number
        default: 500

jobs:
  fuzz:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run in devcontainer
        uses: devcontainers/ci@v0.3
        with:
          runCmd: |
            bash scripts/setup_chimera.sh
            bash scripts/setup_vloghammer.sh
            python3 -u run_fuzz.py --all \
              --count ${{ inputs.count || 1000 }} \
              --file-issues \
              --verbose \
              --output results/fuzz-weekly.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-fuzz-results
          path: |
            results/
            findings/
          retention-days: 30
