name: Nightly Fuzz

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      count:
        description: "Number of designs per generator"
        type: number
        default: 50
      seed:
        description: "Random seed (leave empty for random)"
        type: string
        default: ""

jobs:
  fuzz:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/seiraiyu/ryusim-fuzz:latest
    timeout-minutes: 30
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build generators
        run: |
          bash scripts/setup_chimera.sh
          bash scripts/setup_vloghammer.sh

      - name: Run fuzzing
        run: |
          SEED_ARG=""
          if [ -n "${{ inputs.seed }}" ]; then
            SEED_ARG="--seed ${{ inputs.seed }}"
          fi
          python3 -u run_fuzz.py --all \
            --count ${{ inputs.count || 100 }} \
            $SEED_ARG \
            --file-issues \
            --verbose \
            --output results/fuzz-nightly.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-fuzz-results
          path: |
            results/
            findings/
          retention-days: 30
